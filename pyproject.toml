[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
"sweet.build" = ["*.fsh", "*.vsh"]

[project]
name = "sweet"
version = "0.1.0"
description = "Game Development Module"
authors = [
    { name="Isaque-Ias" }
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pyopengl",
    "numpy",
    "pillow",
    "pygame",
    "pyglm",
    "opencv-python",
    "imageio",
    "pynput",
    "pyperclip",
]